<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Datacenter — Neural Radar (превью дизайна)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛰️</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* ── Дизайн-токены Neural Radar (из design_example/design-tokens.css) ── */
:root {
  --color-brand-cyan: #00f0ff; --color-brand-cyan-dim: #00a8b5;
  --color-brand-violet: #8b5cf6; --color-brand-violet-glow: #a855f7;
  --color-brand-pink: #ff006e; --color-brand-amber: #ffaa00;
  --color-semantic-danger: #ff3860; --color-semantic-success: #00e676;
  --color-bg-primary: #06060a; --color-bg-secondary: #0c0c18;
  --color-bg-card: rgba(20,20,40,.7); --color-bg-card-hover: rgba(30,30,60,.8);
  --color-text-primary: #e0e0f0; --color-text-secondary: #8899aa; --color-text-muted: #556677;
  --color-border-default: rgba(0,240,255,.15); --color-border-glow: rgba(0,240,255,.25);
  --font-display: 'Orbitron', sans-serif; --font-ui: 'Rajdhani', sans-serif;
  --font-body: 'Inter', sans-serif; --font-mono: 'JetBrains Mono', monospace;
  --shadow-card: 0 8px 32px rgba(0,0,0,.4);
  --shadow-glow: 0 0 20px rgba(0,240,255,.1);
  --radius-md: 8px; --radius-lg: 10px; --radius-xl: 12px; --radius-pill: 9999px;
  --easing-smooth: cubic-bezier(.4,0,.2,1);
  --container-max-width: 1600px;
}
[data-theme="light"] {
  --color-bg-primary: #f5f7fa; --color-bg-secondary: rgba(255,255,255,.92);
  --color-bg-card: rgba(255,255,255,.9); --color-bg-card-hover: rgba(255,255,255,.95);
  --color-text-primary: #1a1a2e; --color-text-secondary: #4a4a6a; --color-text-muted: #8a8aa0;
  --color-border-default: rgba(0,0,0,.06); --color-border-glow: rgba(0,0,0,.1);
  --shadow-card: 0 8px 32px rgba(0,0,0,.08);
  --shadow-glow: none;
}
:root {
  --vendor-openai: #10a37f; --vendor-anthropic: #d4a574; --vendor-google: #4285f4;
  --vendor-meta: #0668e1; --vendor-xai: #1d9bf0; --vendor-deepseek: #4f46e5;
  --vendor-mistral: #ff6b6b; --vendor-qwen: #ff5000; --vendor-tencent: #00b8a9;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body); background: var(--color-bg-primary);
  color: var(--color-text-primary); line-height: 1.6; min-height: 100vh;
}

/* ── Фон: сетка + орбы ── */
.bg-animation { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
.bg-grid {
  position: absolute; inset: -50%;
  background-image: linear-gradient(var(--color-border-default) 1px, transparent 1px),
    linear-gradient(90deg, var(--color-border-default) 1px, transparent 1px);
  background-size: 60px 60px; opacity: .35;
  mask-image: radial-gradient(ellipse 60% 45% at 50% 20%, black 10%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 60% 45% at 50% 20%, black 10%, transparent 70%);
}
.orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .25; animation: nr-float-orb 18s ease-in-out infinite; }
.orb-1 { width: 480px; height: 480px; background: var(--color-brand-violet); top: -10%; left: -5%; }
.orb-2 { width: 380px; height: 380px; background: var(--color-brand-cyan-dim); top: 30%; right: -8%; animation-delay: -6s; }
[data-theme="light"] .orb { opacity: .12; }
@keyframes nr-float-orb {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(50px,-30px) scale(1.1); }
  66% { transform: translate(-30px,50px) scale(.9); }
}

/* ── Шапка ── */
.header {
  position: sticky; top: 0; z-index: 1000;
  background: color-mix(in srgb, var(--color-bg-primary) 75%, transparent);
  backdrop-filter: blur(20px); border-bottom: 1px solid var(--color-border-default);
}
.header-inner {
  max-width: var(--container-max-width); margin: 0 auto; padding: 14px 32px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
}
.logo { display: flex; align-items: center; gap: 14px; }
.logo-icon {
  width: 34px; height: 34px; border-radius: 50%; position: relative; flex: 0 0 auto;
  border: 1px solid var(--color-brand-cyan); box-shadow: 0 0 14px rgba(0,240,255,.35);
}
.logo-icon::before {
  content: ''; position: absolute; inset: 7px; border-radius: 50%;
  border: 1px solid var(--color-border-glow);
}
.logo-icon::after {
  content: ''; position: absolute; left: 50%; top: 50%; width: 45%; height: 1.5px;
  background: var(--color-brand-cyan); transform-origin: left center;
  animation: nr-radar-sweep 4s linear infinite;
}
@keyframes nr-radar-sweep { from { transform: rotate(0); } to { transform: rotate(360deg); } }
.logo-text { font-family: var(--font-display); font-size: 19px; font-weight: 700; letter-spacing: 3px; }
.logo-text .accent { color: var(--color-brand-cyan); }
.logo-sub { font-family: var(--font-ui); font-size: 11px; letter-spacing: 3px; color: var(--color-text-muted); text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.live-indicator { display: flex; align-items: center; gap: 8px; font-family: var(--font-ui); font-size: 13px; letter-spacing: 2px; color: var(--color-semantic-success); text-transform: uppercase; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-semantic-success); animation: nr-pulse 2s ease-in-out infinite; }
@keyframes nr-pulse { 0%,100% { opacity: 1; transform: scale(1);} 50% { opacity: .4; transform: scale(1.25);} }
.date-badge, .ctrl-btn, .date-select {
  font-family: var(--font-ui); font-weight: 600; letter-spacing: 1px; font-size: 14px;
  background: transparent; color: var(--color-text-primary);
  border: 1px solid var(--color-border-glow); border-radius: var(--radius-md);
  padding: 6px 14px; cursor: pointer;
}
.ctrl-btn:hover, .date-select:hover { border-color: var(--color-brand-cyan); color: var(--color-brand-cyan); box-shadow: var(--shadow-glow); }
.date-select { background: var(--color-bg-primary); }

/* ── Навигация-вкладки ── */
.nav-bar {
  position: sticky; top: 63px; z-index: 999;
  background: color-mix(in srgb, var(--color-bg-primary) 82%, transparent);
  backdrop-filter: blur(15px); border-bottom: 1px solid var(--color-border-default);
}
.nav-inner { max-width: var(--container-max-width); margin: 0 auto; padding: 0 32px; display: flex; gap: 4px; overflow-x: auto; }
.nav-btn {
  font-family: var(--font-ui); font-size: 14px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--color-text-secondary);
  background: none; border: none; border-bottom: 2px solid transparent;
  padding: 14px 18px; cursor: pointer; white-space: nowrap; transition: all .2s var(--easing-smooth);
}
.nav-btn:hover { color: var(--color-text-primary); }
.nav-btn.active { color: var(--color-brand-cyan); border-bottom-color: var(--color-brand-cyan); text-shadow: 0 0 18px rgba(0,240,255,.5); }

/* ── Hero ── */
.hero { text-align: center; padding: 54px 24px 40px; }
.hero-radar { width: 110px; height: 110px; margin: 0 auto 26px; border-radius: 50%; position: relative;
  border: 1px solid var(--color-border-glow); box-shadow: 0 0 30px rgba(0,240,255,.12) inset, 0 0 24px rgba(0,240,255,.1); }
.radar-ring { position: absolute; border-radius: 50%; border: 1px solid var(--color-border-default); }
.radar-ring:nth-child(1) { inset: 18px; } .radar-ring:nth-child(2) { inset: 36px; }
.radar-center { position: absolute; left: 50%; top: 50%; width: 6px; height: 6px; margin: -3px;
  border-radius: 50%; background: var(--color-brand-cyan); box-shadow: 0 0 12px var(--color-brand-cyan); }
.radar-sweep { position: absolute; left: 50%; top: 50%; width: 50%; height: 1.5px;
  background: linear-gradient(90deg, var(--color-brand-cyan), transparent);
  transform-origin: left center; animation: nr-radar-sweep 4s linear infinite; }
.hero h1 {
  font-family: var(--font-display); font-size: clamp(28px, 5vw, 52px); font-weight: 900;
  letter-spacing: 6px; text-transform: uppercase;
  background: linear-gradient(90deg, var(--color-brand-cyan), var(--color-brand-violet-glow));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.hero-tagline { font-family: var(--font-ui); font-size: 15px; letter-spacing: 4px; text-transform: uppercase; color: var(--color-text-secondary); margin-top: 12px; }
.hero-stats { display: flex; justify-content: center; gap: clamp(24px, 6vw, 72px); margin-top: 36px; flex-wrap: wrap; }
.hero-stat-value { font-family: var(--font-mono); font-size: 32px; font-weight: 600; color: var(--color-brand-cyan); text-shadow: 0 0 18px rgba(0,240,255,.4); }
.hero-stat-label { font-family: var(--font-ui); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--color-text-muted); margin-top: 2px; }

/* ── Контент ── */
.main-content { max-width: var(--container-max-width); margin: 0 auto; padding: 8px 32px 70px; }
.page { display: none; } .page.active { display: block; animation: nr-fade-in .4s var(--easing-smooth); }
@keyframes nr-fade-in { from { opacity: 0; transform: translateY(16px);} to { opacity: 1; transform: none;} }
.section-title { font-family: var(--font-display); font-size: 24px; font-weight: 700; letter-spacing: 2px; color: var(--color-brand-cyan); margin: 26px 0 4px; }
.section-subtitle { font-family: var(--font-ui); font-size: 13px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--color-text-muted); margin-bottom: 22px; }

.period-pills { display: inline-flex; gap: 6px; margin-left: 18px; vertical-align: middle; }
.pill {
  font-family: var(--font-ui); font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
  background: transparent; color: var(--color-text-secondary);
  border: 1px solid var(--color-border-default); border-radius: var(--radius-pill);
  padding: 4px 16px; cursor: pointer;
}
.pill.active { color: var(--color-brand-cyan); border-color: var(--color-brand-cyan); box-shadow: var(--shadow-glow); }

.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 24px; }
.card {
  background: var(--color-bg-card); backdrop-filter: blur(10px);
  border: 1px solid var(--color-border-default); border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card); padding: 22px; position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  transition: transform .2s var(--easing-smooth), border-color .2s, box-shadow .2s;
}
.card:hover { transform: translateY(-3px); border-color: var(--color-border-glow); background: var(--color-bg-card-hover); }
.card.tier-critical { border-top: 2px solid var(--color-brand-pink); }
.card.tier-high { border-top: 2px solid var(--color-brand-amber); }
.card.tier-medium { border-top: 2px solid var(--color-brand-cyan); }
.card.tier-low { border-top: 2px solid var(--color-text-muted); }

.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.card-tag {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  border: 1px solid; border-radius: var(--radius-pill); padding: 2px 12px;
}
.card-tag.danger { color: var(--color-brand-pink); border-color: var(--color-brand-pink); }
.card-tag.warning { color: var(--color-brand-amber); border-color: var(--color-brand-amber); }
.card-tag.info { color: var(--color-brand-cyan); border-color: var(--color-brand-cyan); }
.card-tag.muted { color: var(--color-text-muted); border-color: var(--color-text-muted); }
.card-tag.violet { color: var(--color-brand-violet-glow); border-color: var(--color-brand-violet-glow); }
.rank-vendor { display: flex; align-items: baseline; gap: 10px; }
.vendor-chip { font-family: var(--font-ui); font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--vendor-c, var(--color-text-secondary)); }
.priority-rank { font-family: var(--font-mono); font-size: 26px; font-weight: 600; color: var(--color-text-muted); opacity: .55; }

.card-title { font-family: var(--font-ui); font-size: 19px; font-weight: 700; line-height: 1.3; margin-bottom: 10px; }
.card-title a { color: inherit; text-decoration: none; }
.card-title a:hover { color: var(--color-brand-cyan); }
.card-text { font-size: 14px; color: var(--color-text-secondary); }
.impact-reason { font-size: 12.5px; color: var(--color-text-muted); font-style: italic; margin-top: 8px; }

.quote-block {
  border-left: 2px solid var(--color-brand-cyan); border-radius: 0 var(--radius-md) var(--radius-md) 0;
  background: color-mix(in srgb, var(--color-brand-cyan) 6%, transparent);
  padding: 10px 14px; margin-top: 14px; font-size: 13.5px; font-style: italic; color: var(--color-text-secondary);
}
.quote-author { font-family: var(--font-ui); font-style: normal; font-size: 12px; letter-spacing: 1px; color: var(--color-brand-cyan); margin-top: 6px; }
.quote-author a { color: inherit; text-decoration: none; } .quote-author a:hover { text-decoration: underline; }

.card details { margin-top: 12px; }
.card summary { font-family: var(--font-ui); font-size: 13px; font-weight: 600; letter-spacing: 1px; color: var(--color-brand-cyan); cursor: pointer; text-transform: uppercase; }
.detail-item { font-size: 13px; color: var(--color-text-secondary); margin: 8px 0 0; }
.detail-item a { color: var(--color-brand-cyan); text-decoration: none; }
.stance { font-family: var(--font-ui); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-right: 6px; }
.stance.positive { color: var(--color-semantic-success); } .stance.skeptical { color: var(--color-semantic-danger); } .stance.neutral { color: var(--color-text-muted); }

.impact-row { display: flex; align-items: center; gap: 12px; margin-top: auto; padding-top: 16px; }
.impact-label { font-family: var(--font-ui); font-size: 11px; letter-spacing: 2px; color: var(--color-text-muted); text-transform: uppercase; }
.impact-bar { flex: 1; height: 5px; border-radius: var(--radius-pill); background: color-mix(in srgb, var(--color-text-muted) 25%, transparent); overflow: hidden; }
.impact-fill { height: 100%; border-radius: var(--radius-pill); }
.tier-critical .impact-fill { background: linear-gradient(90deg, var(--color-brand-amber), var(--color-brand-pink)); }
.tier-high .impact-fill { background: linear-gradient(90deg, var(--color-semantic-success), var(--color-brand-amber)); }
.tier-medium .impact-fill { background: linear-gradient(90deg, var(--color-brand-cyan-dim), var(--color-brand-cyan)); }
.tier-low .impact-fill { background: var(--color-text-muted); }
.impact-value { font-family: var(--font-mono); font-size: 15px; font-weight: 600; }
.card-footer { display: flex; justify-content: space-between; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--color-border-default); font-size: 12px; color: var(--color-text-muted); }
.card-source a { color: var(--color-text-muted); text-decoration: none; }
.card-source a:hover { color: var(--color-brand-cyan); }

/* ── Эксперты ── */
.expert-cover { margin: -22px -22px 16px; aspect-ratio: 16/9; overflow: hidden; border-bottom: 1px solid var(--color-border-default); position: relative; }
.expert-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.expert-cover .type-glyph {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 42px; color: var(--color-border-glow);
  background: radial-gradient(circle at 30% 30%, color-mix(in srgb, var(--color-brand-violet) 18%, transparent), transparent 70%);
}
.expert-links { display: flex; gap: 18px; margin-top: auto; padding-top: 14px; }
.expert-links a { font-family: var(--font-ui); font-size: 14px; font-weight: 600; letter-spacing: 1px; color: var(--color-brand-cyan); text-decoration: none; text-transform: uppercase; }
.expert-links a:hover { text-shadow: 0 0 14px rgba(0,240,255,.6); }
.expert-meta { font-family: var(--font-ui); font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-text-muted); margin-bottom: 8px; }

.empty-note { color: var(--color-text-muted); padding: 40px 0; font-family: var(--font-ui); letter-spacing: 1px; }
.preview-banner {
  max-width: var(--container-max-width); margin: 14px auto 0; padding: 8px 32px;
  font-family: var(--font-ui); font-size: 13px; letter-spacing: 1px; color: var(--color-brand-amber);
}
.footer { border-top: 1px solid var(--color-border-default); padding: 22px 32px; text-align: center;
  font-family: var(--font-ui); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--color-text-muted); }

@media (max-width: 640px) {
  .header-inner, .nav-inner, .main-content { padding-left: 16px; padding-right: 16px; }
  .card-grid { grid-template-columns: 1fr; }
  .nav-bar { top: 108px; }
}
</style>
</head>
<body>
<div class="bg-animation"><div class="bg-grid"></div><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon"></div>
      <div>
        <div class="logo-text">LLM <span class="accent">DATACENTER</span></div>
        <div class="logo-sub" data-i18n="logo_sub"></div>
      </div>
    </div>
    <div class="header-right">
      <span class="live-indicator"><span class="live-dot"></span><span data-i18n="live"></span></span>
      <select id="date-select" class="date-select" aria-label="date"></select>
      <button id="lang-toggle" class="ctrl-btn">RU</button>
      <button id="theme-toggle" class="ctrl-btn" aria-label="theme">◐</button>
    </div>
  </div>
</header>

<nav class="nav-bar">
  <div class="nav-inner">
    <button class="nav-btn active" data-page="radar" data-i18n="tab_radar"></button>
    <button class="nav-btn" data-page="experts" data-i18n="tab_experts"></button>
  </div>
</nav>

<div class="preview-banner" data-i18n="preview_note"></div>

<section class="hero">
  <div class="hero-radar">
    <div class="radar-ring"></div><div class="radar-ring"></div>
    <div class="radar-center"></div><div class="radar-sweep"></div>
  </div>
  <h1>LLM Datacenter</h1>
  <div class="hero-tagline" data-i18n="tagline"></div>
  <div class="hero-stats" id="hero-stats"></div>
</section>

<main class="main-content">
  <div class="page active" id="page-radar">
    <h2 class="section-title"><span data-i18n="radar_title"></span>
      <span class="period-pills">
        <button class="pill active" data-view="day" data-i18n="view_day"></button>
        <button class="pill" data-view="week" data-i18n="view_week"></button>
        <button class="pill" data-view="month" data-i18n="view_month"></button>
      </span>
    </h2>
    <div class="section-subtitle" data-i18n="radar_sub"></div>
    <div class="card-grid" id="news-grid"></div>
  </div>

  <div class="page" id="page-experts">
    <h2 class="section-title" data-i18n="experts_title"></h2>
    <div class="section-subtitle" data-i18n="experts_sub"></div>
    <div class="card-grid" id="expert-grid"></div>
  </div>
</main>

<footer class="footer"><span data-i18n="footer"></span></footer>

<script>
"use strict";

const I18N = {
  ru: {
    logo_sub: "сводка новостей LLM", live: "обновлено",
    tab_radar: "Радар дня", tab_experts: "Эксперты · статьи и видео",
    tagline: "ежедневная разведка мира LLM",
    preview_note: "⚠ Превью нового дизайна (Neural Radar). Основной дашборд — index.html; данные общие.",
    radar_title: "Радар нововведений", radar_sub: "ранжировано по масштабу инновации",
    experts_title: "Эксперты", experts_sub: "конспекты статей и видео с раскрытием методов",
    view_day: "День", view_week: "Неделя", view_month: "Месяц",
    stat_news: "новостей", stat_impact: "макс. impact", stat_clusters: "сюжетов", stat_experts: "конспектов",
    tier_critical: "Парадигма", tier_high: "Мажор", tier_medium: "Заметно", tier_low: "Минор",
    details: "Мнения и кейсы", source: "Источник",
    note_link: "Конспект", original_link: "Оригинал ↗",
    type_article: "Статья", type_video: "Видео",
    impact: "Impact", empty: "Нет данных за период",
    footer: "LLM Datacenter · обновляется ежедневно в 08:00 GMT+3"
  },
  en: {
    logo_sub: "LLM news digest", live: "updated",
    tab_radar: "Daily radar", tab_experts: "Experts · articles & videos",
    tagline: "daily intelligence on the LLM landscape",
    preview_note: "⚠ New design preview (Neural Radar). The main dashboard is index.html; data is shared.",
    radar_title: "Innovation radar", radar_sub: "ranked by innovation scale",
    experts_title: "Experts", experts_sub: "article & video digests that unpack the methods",
    view_day: "Day", view_week: "Week", view_month: "Month",
    stat_news: "news items", stat_impact: "max impact", stat_clusters: "stories", stat_experts: "digests",
    tier_critical: "Paradigm", tier_high: "Major", tier_medium: "Notable", tier_low: "Minor",
    details: "Opinions & use cases", source: "Source",
    note_link: "Digest", original_link: "Original ↗",
    type_article: "Article", type_video: "Video",
    impact: "Impact", empty: "No data for this period",
    footer: "LLM Datacenter · updated daily at 08:00 GMT+3"
  }
};

const VENDORS = {
  anthropic: ["Anthropic", "var(--vendor-anthropic)"], openai: ["OpenAI", "var(--vendor-openai)"],
  google: ["Google", "var(--vendor-google)"], meta: ["Meta", "var(--vendor-meta)"],
  xai: ["xAI", "var(--vendor-xai)"], mistral: ["Mistral", "var(--vendor-mistral)"],
  deepseek: ["DeepSeek", "var(--vendor-deepseek)"], qwen: ["Qwen", "var(--vendor-qwen)"],
  tencent: ["Tencent", "var(--vendor-tencent)"]
};

/* обложки видео-конспектов (превью; при внедрении переедет в данные) */
const COVERS = {
  "2026-07-09-nateherk-storm-method": "media/frames/stanford-storm-method-claude-research/000015.jpg",
  "2026-07-09-pocock-skills-v1-1": "media/frames/skills-v1-1-wayfinder/000285.jpg",
  "2026-07-09-nateherk-one-prompt-business": "media/frames/fable-5-built-me-a-business/000450.jpg"
};
const TOP_N = { week: 10, month: 15 };

const state = {
  lang: localStorage.getItem("lang") || "ru",
  theme: localStorage.getItem("theme") || "dark",
  view: "day", pageTab: "radar", date: null, index: null, cache: new Map()
};
const t = (k) => (I18N[state.lang] && I18N[state.lang][k]) || k;
const loc = (f) => (f && (f[state.lang] || f.ru || f.en)) || "";
const esc = (s) => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

async function loadIndex() {
  const res = await fetch("data/index.json");
  state.index = await res.json();
  state.index.days.sort((a,b) => b.date.localeCompare(a.date));
}
async function loadDay(date) {
  if (state.cache.has(date)) return state.cache.get(date);
  try {
    const res = await fetch(`data/daily/${date}.json`);
    if (!res.ok) return null;
    const d = await res.json(); state.cache.set(date, d); return d;
  } catch { return null; }
}
function datesInPeriod(endDate, days) {
  const end = new Date(endDate + "T00:00:00Z"), start = new Date(end);
  start.setUTCDate(start.getUTCDate() - (days - 1));
  return state.index.days.map(d => d.date).filter(date => {
    const dt = new Date(date + "T00:00:00Z"); return dt >= start && dt <= end;
  });
}
function aggregate(dayJsons, topN) {
  const byCluster = new Map();
  for (const day of dayJsons) for (const item of day.news) {
    const key = item.cluster_id || item.id, prev = byCluster.get(key);
    if (!prev || item.impact_score > prev.impact_score ||
        (item.impact_score === prev.impact_score && day.date > prev._date))
      byCluster.set(key, { ...item, _date: day.date });
  }
  return [...byCluster.values()]
    .sort((a,b) => b.impact_score - a.impact_score || b._date.localeCompare(a._date))
    .slice(0, topN);
}
function collectExperts(dayJsons) {
  const seen = new Set(), out = [];
  for (const day of dayJsons) for (const e of day.expert_content || []) {
    if (!seen.has(e.id)) { seen.add(e.id); out.push({ ...e, _date: day.date }); }
  }
  return out;
}
const tierOf = (s) => s >= 9 ? "critical" : s >= 7 ? "high" : s >= 4 ? "medium" : "low";
const tierBadge = { critical: "danger", high: "warning", medium: "info", low: "muted" };

function newsCard(item, i, showDate) {
  const tier = tierOf(item.impact_score);
  const vendor = (item.models || [])[0];
  const [vName, vColor] = VENDORS[vendor] || ["", ""];
  const firstOp = (item.opinions || [])[0];
  const restOps = (item.opinions || []).slice(1);
  const quote = firstOp ? `
    <div class="quote-block">«${esc(loc(firstOp.quote))}»
      <div class="quote-author">— <a href="${esc(firstOp.url)}" target="_blank" rel="noopener">${esc(firstOp.author)}</a></div>
    </div>` : "";
  const detailRows = [
    ...restOps.map(o => `<div class="detail-item"><span class="stance ${esc(o.stance||"neutral")}">●</span>
      <b>${esc(o.author)}:</b> ${esc(loc(o.quote))} <a href="${esc(o.url)}" target="_blank" rel="noopener">↗</a></div>`),
    ...(item.use_cases || []).map(u => `<div class="detail-item">▸ ${esc(loc(u.text))} <a href="${esc(u.url)}" target="_blank" rel="noopener">↗</a></div>`)
  ].join("");
  const details = detailRows ? `<details><summary>${t("details")}</summary>${detailRows}</details>` : "";
  return `
  <article class="card tier-${tier}">
    <div class="card-header">
      <span class="card-tag ${tierBadge[tier]}">${t("tier_" + tier)}</span>
      <span class="rank-vendor">
        ${vName ? `<span class="vendor-chip" style="--vendor-c:${vColor}">${vName}</span>` : ""}
        <span class="priority-rank">${String(i+1).padStart(2,"0")}</span>
      </span>
    </div>
    <h3 class="card-title"><a href="${esc(item.source_url)}" target="_blank" rel="noopener">${esc(loc(item.title))}</a></h3>
    <p class="card-text">${esc(loc(item.summary))}</p>
    <div class="impact-reason">${esc(loc(item.impact_reason))}</div>
    ${quote}${details}
    <div class="impact-row">
      <span class="impact-label">${t("impact")}</span>
      <div class="impact-bar"><div class="impact-fill" style="width:${item.impact_score*10}%"></div></div>
      <span class="impact-value">${item.impact_score}.0</span>
    </div>
    <div class="card-footer">
      <span class="card-source"><a href="${esc(item.source_url)}" target="_blank" rel="noopener">${t("source")} ↗</a></span>
      <span>${showDate ? item._date : ""}</span>
    </div>
  </article>`;
}

function expertCard(e) {
  const cover = COVERS[e.id]
    ? `<div class="expert-cover"><img src="${COVERS[e.id]}" alt="" loading="lazy"></div>`
    : `<div class="expert-cover"><div class="type-glyph">${e.type === "video" ? "▶" : "¶"}</div></div>`;
  return `
  <article class="card tier-medium">
    ${cover}
    <div class="card-header" style="margin-bottom:8px">
      <span class="card-tag ${e.type === "video" ? "violet" : "info"}">${t("type_" + e.type)}</span>
      <span class="expert-meta">${esc(e.author)} · ${e._date || ""}</span>
    </div>
    <h3 class="card-title">${esc(loc(e.title))}</h3>
    <p class="card-text">${esc(loc(e.summary))}</p>
    <div class="expert-links">
      ${e.note_page ? `<a href="${esc(e.note_page)}">${t("note_link")} →</a>` : ""}
      <a href="${esc(e.url)}" target="_blank" rel="noopener">${t("original_link")}</a>
    </div>
  </article>`;
}

function renderChrome() {
  document.documentElement.setAttribute("data-theme", state.theme);
  document.documentElement.lang = state.lang;
  document.getElementById("lang-toggle").textContent = state.lang.toUpperCase();
  document.querySelectorAll("[data-i18n]").forEach(el => el.textContent = t(el.getAttribute("data-i18n")));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.page === state.pageTab));
  document.querySelectorAll(".pill").forEach(b => b.classList.toggle("active", b.dataset.view === state.view));
  document.querySelectorAll(".page").forEach(p => p.classList.toggle("active", p.id === "page-" + state.pageTab));
  const sel = document.getElementById("date-select");
  sel.innerHTML = state.index.days.map(d =>
    `<option value="${d.date}" ${d.date === state.date ? "selected" : ""}>${d.date}</option>`).join("");
}

async function render() {
  renderChrome();
  let dates;
  if (state.view === "day") dates = [state.date];
  else if (state.view === "week") dates = datesInPeriod(state.date, 7);
  else dates = datesInPeriod(state.date, 30);
  const dayJsons = (await Promise.all(dates.map(loadDay))).filter(Boolean);

  let items;
  if (state.view === "day")
    items = dayJsons.length ? dayJsons[0].news.map(n => ({ ...n, _date: dayJsons[0].date }))
      .sort((a,b) => b.impact_score - a.impact_score) : [];
  else items = aggregate(dayJsons, TOP_N[state.view]);
  const experts = collectExperts(dayJsons);

  const clusters = new Set(items.map(i => i.cluster_id || i.id)).size;
  const maxImpact = items.length ? Math.max(...items.map(i => i.impact_score)) : 0;
  document.getElementById("hero-stats").innerHTML = [
    [items.length, t("stat_news")], [maxImpact || "—", t("stat_impact")],
    [clusters, t("stat_clusters")], [experts.length, t("stat_experts")]
  ].map(([v,l]) => `<div class="hero-stat"><div class="hero-stat-value">${v}</div><div class="hero-stat-label">${l}</div></div>`).join("");

  document.getElementById("news-grid").innerHTML =
    items.length ? items.map((it,i) => newsCard(it, i, state.view !== "day")).join("")
    : `<div class="empty-note">${t("empty")}</div>`;
  document.getElementById("expert-grid").innerHTML =
    experts.length ? experts.map(expertCard).join("") : `<div class="empty-note">${t("empty")}</div>`;
}

document.getElementById("theme-toggle").addEventListener("click", () => {
  state.theme = state.theme === "dark" ? "light" : "dark";
  localStorage.setItem("theme", state.theme); render();
});
document.getElementById("lang-toggle").addEventListener("click", () => {
  state.lang = state.lang === "ru" ? "en" : "ru";
  localStorage.setItem("lang", state.lang); render();
});
document.querySelectorAll(".nav-btn").forEach(b =>
  b.addEventListener("click", () => { state.pageTab = b.dataset.page; render(); }));
document.querySelectorAll(".pill").forEach(b =>
  b.addEventListener("click", () => { state.view = b.dataset.view; render(); }));
document.getElementById("date-select").addEventListener("change", (e) => { state.date = e.target.value; render(); });

(async function init() {
  const params = new URLSearchParams(location.search);
  if (["ru","en"].includes(params.get("lang"))) state.lang = params.get("lang");
  if (["dark","light"].includes(params.get("theme"))) state.theme = params.get("theme");
  if (["day","week","month"].includes(params.get("view"))) state.view = params.get("view");
  if (["radar","experts"].includes(params.get("tab"))) state.pageTab = params.get("tab");
  await loadIndex();
  const dates = state.index.days.map(d => d.date);
  state.date = dates.includes(params.get("date")) ? params.get("date") : dates[0] || null;
  await render();
})();
</script>
</body>
</html>

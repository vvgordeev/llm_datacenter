<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Datacenter</title>
<link rel="stylesheet" href="assets/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛰️</text></svg>">
</head>
<body>
<div class="bg-animation"><div class="bg-grid"></div><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon"></div>
      <div>
        <div class="logo-text">LLM <span class="accent">DATACENTER</span></div>
        <div class="logo-sub" data-i18n="logo_sub"></div>
      </div>
    </div>
    <div class="header-right">
      <span class="live-indicator"><span class="live-dot"></span><span data-i18n="live"></span></span>
      <span class="period-pills">
        <button class="pill active" data-view="day" data-i18n="view_day"></button>
        <button class="pill" data-view="week" data-i18n="view_week"></button>
        <button class="pill" data-view="month" data-i18n="view_month"></button>
      </span>
      <select id="date-select" class="date-select" aria-label="date"></select>
      <button id="lang-toggle" class="ctrl-btn">RU</button>
      <button id="theme-toggle" class="ctrl-btn" aria-label="theme">◐</button>
    </div>
  </div>
</header>

<nav class="nav-bar">
  <div class="nav-inner">
    <button class="nav-btn active" data-page="radar" data-i18n="tab_radar"></button>
    <button class="nav-btn" data-page="experts" data-i18n="tab_experts"></button>
  </div>
</nav>

<div id="demo-banner" class="demo-banner" hidden><span data-i18n="demo_banner"></span></div>

<section class="hero">
  <div class="hero-radar">
    <div class="radar-ring"></div><div class="radar-ring"></div>
    <div class="radar-center"></div><div class="radar-sweep"></div>
  </div>
  <h1>LLM Datacenter</h1>
  <div class="hero-tagline" data-i18n="tagline"></div>
  <div class="hero-stats" id="hero-stats"></div>
</section>

<main class="main-content">
  <div class="page active" id="page-radar">
    <h2 class="section-title" data-i18n="radar_title"></h2>
    <div class="section-subtitle" data-i18n="radar_sub"></div>
    <div class="filters" id="model-filters"></div>
    <div class="card-grid" id="news-grid"></div>
  </div>

  <div class="page" id="page-experts">
    <h2 class="section-title" data-i18n="experts_title"></h2>
    <div class="section-subtitle" data-i18n="experts_sub"></div>
    <div class="card-grid" id="expert-grid"></div>
  </div>
</main>

<footer class="footer">
  <span data-i18n="footer"></span>
  <a href="https://github.com/vvgordeev/llm_datacenter" data-i18n="footer_repo"></a>
</footer>

<script src="assets/app.js"></script>
</body>
</html>
